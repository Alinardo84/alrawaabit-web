  <circle cx="200" cy="200" r="150" stroke="#F97316" stroke-width="2" fill="none" opacity="0.1"/>
  <circle cx="1000" cy="800" r="200" stroke="#F97316" stroke-width="2" fill="none" opacity="0.1"/>
